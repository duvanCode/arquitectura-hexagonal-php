version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# Arquitectura Hexagonal PHP — Docker Compose de producción
#
# Para Dokploy:
#   1. Nueva aplicación → tipo "Docker Compose"
#   2. Apuntar al repositorio Git
#   3. Definir variables de entorno en el panel de Dokploy (ver .env.example)
#   4. Primer despliegue: añadir RUN_SEEDER=true → crea tablas + usuario admin
#      Despliegues siguientes: RUN_SEEDER=false (o no definirla)
#
# Para uso local:
#   cp .env.example .env   # ajustar valores
#   docker compose up -d --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Aplicación (PHP 8.2 + Nginx + Supervisor) ──────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: hexagonal-php-app
    container_name: hexagonal_app
    restart: unless-stopped
    environment:
      APP_PORT:        ${APP_PORT:-8080}
      DB_HOST:         db
      DB_PORT:         "3306"
      DB_NAME:         ${DB_NAME:-crud_usuarios}
      # La app se conecta siempre como root usando DB_ROOT_PASSWORD
      DB_USER:         root
      DB_PASSWORD:     ${DB_ROOT_PASSWORD:-rootsecret}
      DB_CHARSET:      utf8mb4
      MAIL_HOST:       ${MAIL_HOST:-}
      MAIL_PORT:       ${MAIL_PORT:-587}
      MAIL_USERNAME:   ${MAIL_USERNAME:-}
      MAIL_PASSWORD:   ${MAIL_PASSWORD:-}
      MAIL_FROM:       ${MAIL_FROM:-}
      MAIL_FROM_NAME:  ${MAIL_FROM_NAME:-App}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-tls}
      RUN_SEEDER:      ${RUN_SEEDER:-false}
    ports:
      - "${APP_PORT:-8080}:${APP_PORT:-8080}"
    # Sin depends_on — el entrypoint.sh espera a MySQL con nc antes de arrancar
    networks:
      - hexagonal_net

  # ── Base de datos MySQL 8 ─────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: hexagonal_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE:      ${DB_NAME:-crud_usuarios}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      # MYSQL_USER no se define aquí: MySQL prohíbe usar "root" como MYSQL_USER.
      # La app se conecta directamente con root vía DB_ROOT_PASSWORD.
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - hexagonal_net

# ── Volúmenes ─────────────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local

# ── Red interna ───────────────────────────────────────────────────────────
networks:
  hexagonal_net:
    driver: bridge
